; PlatformIO Project Configuration
; ChromaCatch ESP32 firmware (single codebase, dual targets)

[platformio]
default_envs = esp32s3

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
extra_scripts =
    pre:tools/pio_env_wifi.py
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DUSE_NIMBLE
lib_deps =
    https://github.com/Mystfit/ESP32-BLE-CompositeHID.git
    https://github.com/esp32beans/switch_ESP32.git
    h2zero/NimBLE-Arduino@^2.1.0
    tomstewart89/Callback@^1.1.0
    links2004/WebSockets@^2.6.1
    bxparks/AceButton@^1.10.1
    zinggjm/GxEPD2@^1.5.0
    adafruit/Adafruit GFX Library@^1.11.0
    bblanchon/ArduinoJson@^7.0.0

[env:esp32s3]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:esp32s3_switch]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0

[env:esp32]
board = esp32dev
framework = arduino, espidf
board_build.sdkconfig = sdkconfig.esp32
board_build.cmake_extra_args =
    -DCMAKE_C_FLAGS=-Wno-error
    -DCMAKE_CXX_FLAGS=-Wno-error
build_flags =
    ${env.build_flags}
    -Wno-error=delete-non-virtual-dtor
